name: Tests

# Run the full pytest suite on every push and pull request.
# This is the reliability gate: docs deploy and PyPI publishing must never
# outrun a red test suite.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      # Pin BLAS threading: the suite solves many small eigenproblems, and
      # thread oversubscription makes CI slower and timing-flaky.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest ikarus/tests/ -q
