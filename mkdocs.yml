site_name: Ikarus
site_description: >-
  High-precision 2-D RCWA (Fourier Modal Method) simulation for periodic
  photonic structures — metasurfaces, gratings and photonic crystals.
site_author: Liam Shelling Neto
site_url: https://cavitytechnologies.github.io/ikarus/

repo_name: CAVITYtechnologies/ikarus
repo_url: https://github.com/CAVITYtechnologies/ikarus
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 CAVITY technologies UG — MIT License

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Fly by night
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Fly by day
  logo: assets/ikarus_logo.png
  favicon: assets/ikarus_logo.png
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

plugins:
  - search

hooks:
  - mkdocs_hooks.py

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - The Physics:
      - How RCWA Works: theory.md
      - Core Concepts: core-concepts.md
  - Flight School:
      - tutorials/index.md
      - "Lesson 1 · Spectra 101": tutorials/reflection-transmission.md
      - "Lesson 2 · Splitting Light": tutorials/gratings.md
      - "Lesson 3 · Sculpting Wavefronts": tutorials/metasurfaces.md
      - "Lesson 4 · Sweeping Gracefully": tutorials/parameter-sweeps.md
      - "Lesson 5 · Twisting Light": tutorials/polarization.md
      - "Lesson 6 · Coming in at an Angle": tutorials/angular-response.md
      - "Lesson 7 · Designing the Shape Itself": tutorials/inverse-design.md
      - "Lesson 8 · Stacking the Deck": tutorials/structures.md
      - Aerobatics (Advanced): advanced.md
      - The Hangar (Examples): examples-gallery.md
      - Need for Speed (Performance): performance.md
  - Reference:
      - API:
          - api/index.md
          - RCWA & Results: api/rcwa.md
          - Source: api/source.md
          - Layers & Materials: api/materials-layers.md
          - Shapes: api/shapes.md
          - Inverse Design: api/inverse.md
          - Fields & Visualization: api/fields-viz.md
          - Sweeps & Progress: api/sweeps.md
          - Tools: api/tools.md
          - Low-level: api/low-level.md
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
      - For AI Assistants: llms.md
  - Project:
      - Developer Guide: developer-guide.md
      - Citation: citation.md
      - License: license.md
